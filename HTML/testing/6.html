<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>EcoShop Login</title>

    <!--Bootstrap&Js-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <main class="container-fluid vh-100 d-flex justify-content-center align-items-center">

        <section class="card shadow-lg border-0 rounded-4 p-4 col-11 col-sm-8 col-md-5 col-lg-4">

            <div class="text-center mb-4">
                <h1 class="display-6 text-success fw-bold">EcoShop</h1>
                <p class="text-secondary">Productos ecológicos y sostenibles</p>
            </div>

            <form>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>

                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="Introduce tu email">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>

                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Introduce tu contraseña">
                </div>

                <div class="d-grid">
                    <button class="btn btn-success btn-lg">
                        Iniciar sesión
                    </button>
                </div>

            </form>

        </section>

    </main>

</body>
</html>
