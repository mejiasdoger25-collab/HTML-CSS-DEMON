<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>EcoShop Login</title>

    <!--Bootstrap&Js-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <main class="container-fluid">

        <div class="row vh-100">

            <!-- Zona izquierda -->
            <section class="d-none d-lg-flex col-lg-6 bg-success text-white flex-column justify-content-center align-items-center p-5">

                <h1 class="display-3 fw-bold mb-4">
                    EcoShop
                </h1>

                <p class="lead text-center">
                    Compra productos ecológicos y ayuda al planeta.
                </p>

            </section>

            <!-- Zona login -->
            <section class="col-12 col-lg-6 d-flex justify-content-center align-items-center bg-light">

                <div class="card shadow-lg border-0 rounded-4 p-4 col-10 col-md-7">

                    <div class="card-body">

                        <h2 class="text-center text-success mb-4">
                            Iniciar sesión
                        </h2>

                        <form>

                            <div class="mb-3">
                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    placeholder="ejemplo@correo.com">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">
                                    Contraseña
                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    placeholder="********">
                            </div>

                            <div class="d-grid">
                                <button class="btn btn-success btn-lg">
                                    Acceder
                                </button>
                            </div>

                        </form>

                    </div>

                </div>

            </section>

        </div>

    </main>

</body>
</html>
