<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>EcoShop Login</title>

    <!--Bootstrap&Js-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <!-- Fondo principal -->
    <main
        class="container-fluid vh-100 d-flex justify-content-center align-items-center"
        style="
            background-image: url('img/eco-img.webp');
            background-size: cover;
            background-position: center;
        ">

        <!-- Recuadro central -->
        <section
            class="col-11 col-lg-8 rounded-5 shadow-lg p-5 bg-success-subtle">

            <div class="row justify-content-center">

                <!-- Card Login -->
                <div class="col-12 col-md-8 col-lg-6">

                    <div class="card shadow rounded-4 border-0">

                        <div class="card-body p-5">

                            <h2 class="text-center text-success mb-4">
                                Bienvenido a EcoShop
                            </h2>

                            <form>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Usuario
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        placeholder="Nombre de usuario">

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Contraseña
                                    </label>

                                    <input
                                        type="password"
                                        class="form-control"
                                        placeholder="Contraseña">

                                </div>

                                <div class="form-check mb-4">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="remember">

                                    <label
                                        class="form-check-label"
                                        for="remember">

                                        Recordarme

                                    </label>

                                </div>

                                <div class="d-grid">

                                    <button class="btn btn-success">
                                        Entrar
                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
